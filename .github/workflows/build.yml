name: Build Android Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Dazai Player
    runs-on: ubuntu-latest
    
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8' # Professional Choice: specify a version if wrapper is missing
          cache-disabled: false
          generate-job-summary: true

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace --build-cache --parallel --no-daemon
        env:
          ORG_GRADLE_JVMARGS: "-Xmx2048m -XX:MaxMetaspaceSize=512m"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dazai-Player-Debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7
